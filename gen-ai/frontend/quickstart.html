<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Quickstart - SSE Chat</title>
  <style>
    body{font-family:system-ui,Segoe UI,Helvetica,Arial;background:#f3f4f6;color:#0f172a;margin:0;padding:16px}
    .container{max-width:800px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(2,6,23,0.08)}
    textarea{width:100%;height:100px;padding:10px;font-size:16px;box-sizing:border-box}
    button{padding:10px 16px;margin-top:8px;margin-right:8px;background:#0f172a;color:#fff;border:none;border-radius:4px;cursor:pointer}
    button:hover{background:#1e293b}
    #messages{white-space:pre-wrap;background:#111827;color:#f8fafc;padding:12px;border-radius:6px;min-height:120px;overflow-y:auto;max-height:300px}
    .meta{font-size:13px;color:#6b7280}
    a{color:#2563eb;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Quickstart — Chat (SSE)</h1>
    <p class="meta">Démonstration locale: streaming SSE intégré au backend. <a href="/">← Retour au chat principal</a></p>

    <label for="prompt">Votre message :</label>
    <textarea id="prompt" placeholder="Posez votre question en français..."></textarea>
    <br />
    <button id="send">Envoyer et stream</button>
    <button id="stop">Arrêter</button>

    <h3>Réponse :</h3>
    <div id="messages"></div>
  </div>

  <script src="./script-quickstart.js"></script>
</body>
</html>
